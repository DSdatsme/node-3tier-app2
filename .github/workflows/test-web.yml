name: Test Web

on:
  workflow_dispatch:
  pull_request:
    branches: [master]
    paths:
      - "web/**"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Install dependencies
        run: cd web && npm ci

      - name: Run ESLint
        run: cd web && npm run lint

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Run npm audit
        run: cd web && npm audit --audit-level=critical

  hadolint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: web/Dockerfile

  build:
    runs-on: ubuntu-latest
    needs: [lint, audit, hadolint]
    steps:
      - uses: actions/checkout@v5

      - name: Set image tag
        id: meta
        run: echo "tag=nodeapp-web:dev-${{ github.event.pull_request.head.sha || github.sha }}" >> $GITHUB_OUTPUT

      - name: Build image
        run: |
          docker build --platform linux/amd64 \
            -t ${{ steps.meta.outputs.tag }} \
            ./web
