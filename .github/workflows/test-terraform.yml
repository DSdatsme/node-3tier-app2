name: Test Terraform

on:
  workflow_dispatch:
  pull_request:
    branches: [master]
    paths:
      - "terraform/**"

env:
  AWS_REGION: us-east-1
  TF_DIR: terraform

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1

      - name: Check formatting
        run: tofu fmt -check -diff -recursive $TF_DIR

  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Init
        run: cd $TF_DIR && tofu init -backend=false

      - name: Validate
        run: cd $TF_DIR && tofu validate

  plan:
    runs-on: ubuntu-latest
    needs: [fmt, validate]
    steps:
      - uses: actions/checkout@v5

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Init
        run: cd $TF_DIR && tofu init

      - name: Plan
        run: cd $TF_DIR && tofu plan -no-color -detailed-exitcode || if [ $? -eq 2 ]; then echo "Changes detected"; else exit 1; fi
        env:
          TF_VAR_cloudfront_origin_secret: ${{ secrets.CLOUDFRONT_ORIGIN_SECRET }}
