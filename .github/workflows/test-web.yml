name: Test Web

on:
  workflow_dispatch:
  pull_request:
    branches: [master]
    paths:
      - "web/**"

env:
  ECR_REPO: nodeapp-web

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: cd web && npm ci

      - name: Run ESLint
        run: cd web && npm run lint

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run npm audit
        run: cd web && npm audit --audit-level=high

  hadolint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: web/Dockerfile

  build:
    runs-on: ubuntu-latest
    needs: [lint, audit, hadolint]
    env:
      IMAGE_TAG: ${{ env.ECR_REPO }}:dev-${{ github.event.pull_request.head.sha || github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: |
          docker build --platform linux/amd64 \
            -t $IMAGE_TAG \
            ./web

      - name: Docker Scout CVE scan
        uses: docker/scout-action@v1
        with:
          command: cves
          image: local://${{ env.IMAGE_TAG }}
          only-severities: critical,high
          exit-code: true
